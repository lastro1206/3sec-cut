name: 넥스트 제이에스 CI/CD 및 노션 기록 자동화 (Next.js CI/CD & Notion Logging)

on:
    push:
        branches:
            - main # 메인 브랜치에 코드가 푸시될 때 작동합니다.

jobs:
    build-and-notify:
        runs-on: ubuntu-latest

        steps:
            # 1. 깃허브 저장소의 코드를 가상 환경으로 가져옵니다.
            - name: 저장소 코드 가져오기 (Checkout repository)
              uses: actions/checkout@v4

            # 2. 노드 제이에스(Node.js) 환경을 설정합니다.
            - name: 노드 제이에스 설정 (Setup Node.js)
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            # 3. 프로젝트에 필요한 패키지(Zustand, Axios 등)를 설치합니다.
            - name: 의존성 패키지 설치 (Install dependencies)
              run: npm install

            # 4. 넥스트 제이에스 앱을 빌드합니다.
            - name: 프로젝트 빌드 (Build project)
              run: npm run build

            # 5. 빌드가 성공적으로 완료되면 노션 API를 호출하여 기록을 남깁니다.
            - name: 노션 데이터베이스에 배포 성공 기록 추가 (Notify Notion on Success)
              if: success()
              env:
                  NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
                  NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
                  COMMIT_MSG: ${{ github.event.head_commit.message }}
                  ACTOR: ${{ github.actor }}
              run: |
                  curl -X POST https://api.notion.com/v1/pages \
                    -H "Authorization: Bearer $NOTION_API_TOKEN" \
                    -H "Content-Type: application/json" \
                    -H "Notion-Version: 2022-06-28" \
                    -d '{
                      "parent": { "database_id": "'"$NOTION_DATABASE_ID"'" },
                      "properties": {
                        "이름": { "title": [ { "text": { "content": "'"$COMMIT_MSG"'" } } ] },
                        "상태": { "select": { "name": "성공" } },
                        "작업자": { "rich_text": [ { "text": { "content": "'"$ACTOR"'" } } ] },
                        "배포일": { "date": { "start": "'"$(date -u +"%Y-%m-%dT%H:%M:%SZ")"'" } }
                      }
                    }'

            # 6. 빌드 중 오류가 발생하면 실패 기록을 남깁니다.
            - name: 노션 데이터베이스에 배포 실패 기록 추가 (Notify Notion on Failure)
              if: failure()
              env:
                  NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
                  NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
                  COMMIT_MSG: ${{ github.event.head_commit.message }}
              run: |
                  curl -X POST https://api.notion.com/v1/pages \
                    -H "Authorization: Bearer $NOTION_API_TOKEN" \
                    -H "Content-Type: application/json" \
                    -H "Notion-Version: 2022-06-28" \
                    -d '{
                      "parent": { "database_id": "'"$NOTION_DATABASE_ID"'" },
                      "properties": {
                        "이름": { "title": [ { "text": { "content": "[빌드 실패] '"$COMMIT_MSG"'" } } ] },
                        "상태": { "select": { "name": "실패" } }
                      }
                    }'
